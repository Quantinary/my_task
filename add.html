    <nav>
        <a href="index.html">Home</a>

    <main>
        <section>
            <h2>Course Details</h2>
            <form>
                <div class="form-group">
                    <label>Course Name:</label>
                    <input type="text" placeholder="Enter course name" required>
                </div>
                <div class="form-group">
                    <label>Instructor:</label>
                    <input type="text" placeholder="Instructor name" required>
                </div>
                <div class="form-group">
                    <label>Credit Hours:</label>
                    <input type="number" placeholder="Number of hours">
                </div>
                <div class="form-group">
                    <label>Notes:</label>
                    <textarea rows="4" placeholder="Any additional notes..."></textarea>
                </div>
                <button type="submit">Save Course Information</button>
            </form>
        </section>
    </main>
